services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: behavioral_predictor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 1G
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./dataset:/dataset
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/behavioral_predictor
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - APP_ENV=development
      - DATA_DIR=/dataset/EventsData
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info"]
    volumes:
      - ./backend:/app
      - ./dataset:/dataset
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/behavioral_predictor
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - APP_ENV=development
      - DATA_DIR=/dataset/EventsData
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  browser:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./browser_model:/usr/share/nginx/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
